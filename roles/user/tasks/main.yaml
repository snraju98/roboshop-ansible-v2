- name: appsetup
  import_role:
    name: common
    tasks_from: app-setup

- name: nodejs setup
  import_role:
    name: common
    tasks_from: nodejs

- name: systemd setup
  import_role:
    name: common
    tasks_from: systemd-setup

- name: enable and restarte
  service:
    name: user
    enabled: yes
    state: restarted